
services:
  # The Node.js Backend & Static React Frontend
  web-app:
    build: .
    restart: unless-stopped
    expose:
      - "8080"

  # The Nginx Container (Listens on public ports 80 and 443)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot-etc:/etc/letsencrypt:ro
      - ./webroot:/var/www/html:ro
    depends_on:
      - web-app

  # The Automated Certbot Renewal Loop Container
  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - ./certbot-etc:/etc/letsencrypt
      - ./webroot:/var/www/html
    # Wakes up every 12 hours, checks for renewal via webroot, and tells nginx to reload
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/html; docker compose exec -T nginx nginx -s reload; sleep 12h & wait $${!}; done;'"