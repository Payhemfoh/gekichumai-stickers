
services:
  # The Node.js Backend & Static React Frontend
  web-app:
    image: ghcr.io/payhemfoh/gekichumai-stickers:latest
    restart: unless-stopped
    expose:
      - "8080"

  # The Nginx Container (Listens on public ports 80 and 443)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot-etc:/etc/letsencrypt:ro
      - ./webroot:/var/www/html:ro
      - ./public/img:/usr/share/nginx/img:ro
    depends_on:
      - web-app
    # Self-reloads every 6h so renewed certs (written by the certbot container) get picked up
    # without needing cross-container access to the Docker socket.
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"

  # The Automated Certbot Renewal Loop Container
  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - ./certbot-etc:/etc/letsencrypt
      - ./webroot:/var/www/html
    # Wakes up every 12 hours and checks for renewal via webroot; nginx picks up
    # renewed certs on its own periodic self-reload (see the nginx service's command).
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/html; sleep 12h & wait $${!}; done;'"