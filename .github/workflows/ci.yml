name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - run: npm ci --legacy-peer-deps

      - run: npm run build
        env:
          CI: true

      - run: npm test -- --watchAll=false --passWithNoTests
