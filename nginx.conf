events { 
    worker_connections 1024; 
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Optimized logging settings
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Performance optimizations
    sendfile        on;
    keepalive_timeout  65;

    # 1. HTTP to HTTPS Redirect & Certbot Challenge Router
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # Shared volume path allowing Certbot to pass its automated renewals
        location /.well-known/acme-challenge/ {
            root /var/www/html;
            try_files $uri =404;
        }

        # Force all other standard HTTP traffic over to secure HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # 2. Secure HTTPS Proxy Server Block
    server {
        # --- SSL CONFIGURATION (Uncomment when certs are active) ---
        listen 443 ssl;
        listen [::]:443 ssl;
        
        server_name yafumin-webapp.ddnsfree.com www.yafumin-webapp.ddnsfree.com localhost;

        ssl_certificate /etc/letsencrypt/live/www.yafumin-webapp.ddnsfree.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/www.yafumin-webapp.ddnsfree.com/privkey.pem;

        # Secure production SSL protocols and ciphers
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Character images: serve directly from nginx (bypassing the Node proxy)
        # with long-lived caching. Files are bind-mounted from the repo's public/img,
        # so this is the same content the SPA references at /img/<series>/<file>.
        location /img/ {
            alias /usr/share/nginx/img/;
            try_files $uri =404;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ALL TRAFFIC PROXY
        # Maps both API endpoints and the static assets back onto your Node runtime
        location / {
            proxy_pass http://web-app:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            
            # Explicit network parameters forwarded straight to req.ip inside Express
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
