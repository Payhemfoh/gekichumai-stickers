events { 
    worker_connections 1024; 
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Optimized logging settings
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Performance optimizations
    sendfile        on;
    keepalive_timeout  65;

    # 1. HTTP to HTTPS Redirect & Certbot Challenge Router
    server {
        listen 80;
        listen [::]:80;
        server_name www.yafumin-webapp.ddnsfree.com;

        # Shared volume path allowing Certbot to pass its automated renewals
        location /.well-known/acme-challenge/ {
            root /var/www/html;
            try_files $uri =404;
        }

        # Force all other standard HTTP traffic over to secure HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # 2. Production HTTPS Server Block
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name www.yafumin-webapp.ddnsfree.com;

        # SSL Certificates mapped into the container from your persistent volume
        ssl_certificate /etc/letsencrypt/live/www.yafumin-webapp.ddnsfree.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/www.yafumin-webapp.ddnsfree.com/privkey.pem;

        # Secure production SSL protocols and ciphers
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # FRONTEND & BACKEND ROUTING
        # Because Nginx and your App container are in the same compose network, 
        # Nginx can target 'web-app' directly as its hostname.
        
        # Matches your backend API endpoints (/log, /logs, /config)
        location ~ ^/(log|logs|config)$ {
            proxy_pass http://web-app:8080; 
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            
            # Forwards user IPs straight through to your Express log file
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Matches all other traffic and serves your React frontend build
        location / {
            proxy_pass http://web-app:80;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}